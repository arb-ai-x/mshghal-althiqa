<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARBIX | أنت مخترق</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Arial Black', monospace;
            text-align: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
            cursor: none;
            user-select: none;
            animation: bodyShake 0.5s infinite;
        }

        @keyframes bodyShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-1px, 1px); }
            20% { transform: translate(1px, -1px); }
            30% { transform: translate(-1px, -1px); }
            40% { transform: translate(1px, 1px); }
            50% { transform: translate(0, 0); }
            60% { transform: translate(1px, -1px); }
            70% { transform: translate(-1px, 1px); }
            80% { transform: translate(1px, 1px); }
            90% { transform: translate(-1px, -1px); }
        }

        /* ظلام دامس مع وميض */
        .darkness {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.8) 70%);
            pointer-events: none;
            z-index: 5;
            animation: darknessPulse 3s ease-in-out infinite;
        }

        @keyframes darknessPulse {
            0%, 100% { background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.8) 70%); }
            50% { background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.95) 60%); }
        }

        /* عيون في الظلام */
        .eyes-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }

        .eye-pair {
            position: absolute;
            animation: eyeFloat 6s ease-in-out infinite;
        }

        @keyframes eyeFloat {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(10px, -15px); }
            50% { transform: translate(-5px, -25px); }
            75% { transform: translate(-15px, -10px); }
        }

        .eye {
            width: 12px;
            height: 16px;
            background: #ff0000;
            border-radius: 50%;
            display: inline-block;
            margin: 0 8px;
            box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #ff0000;
            animation: eyeGlow 1s ease-in-out infinite alternate;
            position: relative;
        }

        .eye::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 2px;
            width: 4px;
            height: 8px;
            background: #000;
            border-radius: 50%;
            animation: pupilMove 2s ease-in-out infinite;
        }

        @keyframes eyeGlow {
            0% { box-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000; }
            100% { box-shadow: 0 0 40px #ff0000, 0 0 80px #ff0000, 0 0 120px #ff0000; }
        }

        @keyframes pupilMove {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(2px, -1px); }
            50% { transform: translate(-2px, 1px); }
            75% { transform: translate(1px, 2px); }
        }

        /* وميض الشاشة السريع */
        .screen-flicker {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 15;
            animation: quickFlicker 0.05s infinite;
            background: transparent;
        }

        @keyframes quickFlicker {
            0%, 95%, 100% { background: transparent; }
            96% { background: rgba(255, 0, 0, 0.08); }
            97% { background: transparent; }
            98% { background: rgba(255, 0, 0, 0.12); }
            99% { background: transparent; }
        }

        /* مؤشر التصويب */
        .custom-cursor {
            position: fixed;
            width: 50px;
            height: 50px;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
        }

        .custom-cursor::before {
            content: '⌖';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 50px;
            color: #ff0000;
            animation: cursorPulse 0.5s ease-in-out infinite;
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff0000, 0 0 80px #ff0000;
        }

        @keyframes cursorPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            25% { transform: translate(-50%, -50%) scale(1.2) rotate(5deg); }
            50% { transform: translate(-50%, -50%) scale(1.4) rotate(0deg); }
            75% { transform: translate(-50%, -50%) scale(1.2) rotate(-5deg); }
        }

        .custom-cursor::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background: #ff0000;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
            animation: cursorDot 0.8s ease-in-out infinite;
        }

        @keyframes cursorDot {
            0%, 100% { width: 4px; height: 4px; }
            50% { width: 8px; height: 8px; }
        }

        /* خطوط المسح */
        .scan-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 12;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 3px,
                rgba(0, 0, 0, 0.3) 3px,
                rgba(0, 0, 0, 0.3) 6px
            );
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            animation: containerGlitch 6s infinite;
        }

        @keyframes containerGlitch {
            0%, 88%, 100% { transform: translate(0); filter: none; }
            89% { transform: translate(-15px, 8px); filter: hue-rotate(90deg) brightness(1.5); }
            90% { transform: translate(15px, -8px); filter: hue-rotate(-90deg) brightness(0.5); }
            91% { transform: translate(-8px, -5px); filter: none; }
            92% { transform: translate(8px, 5px); filter: hue-rotate(180deg); }
            93% { transform: translate(0); filter: none; }
        }

        .box {
            position: relative;
            background: rgba(0, 0, 0, 0.92);
            padding: 40px 60px;
            border: 2px solid #330000;
            box-shadow: 
                0 0 40px rgba(255, 0, 0, 0.4),
                0 0 80px rgba(255, 0, 0, 0.2),
                inset 0 0 40px rgba(255, 0, 0, 0.08);
            max-width: 800px;
            width: 100%;
            animation: boxPulse 3s ease-in-out infinite;
            clip-path: polygon(
                0% 3%, 3% 0%, 97% 0%, 100% 3%, 
                100% 97%, 97% 100%, 3% 100%, 0% 97%
            );
        }

        @keyframes boxPulse {
            0%, 100% { 
                box-shadow: 0 0 40px rgba(255, 0, 0, 0.4), 0 0 80px rgba(255, 0, 0, 0.2), inset 0 0 40px rgba(255, 0, 0, 0.08);
                border-color: #330000;
            }
            50% { 
                box-shadow: 0 0 60px rgba(255, 0, 0, 0.6), 0 0 120px rgba(255, 0, 0, 0.3), inset 0 0 60px rgba(255, 0, 0, 0.15);
                border-color: #660000;
            }
        }

        /* ختم محظور */
        .restricted-stamp {
            position: absolute;
            top: -30px;
            right: -30px;
            font-size: 70px;
            opacity: 0.15;
            pointer-events: none;
            animation: stampRotate 20s linear infinite;
            z-index: -1;
        }

        @keyframes stampRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .skull-container {
            position: relative;
            display: inline-block;
        }

        .skull-icon {
            font-size: 140px;
            display: block;
            margin-bottom: 10px;
            animation: skullHorror 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.9)) 
                    drop-shadow(0 0 60px rgba(255, 0, 0, 0.6)) 
                    drop-shadow(0 0 100px rgba(255, 0, 0, 0.4))
                    drop-shadow(0 0 150px rgba(255, 0, 0, 0.2));
        }

        @keyframes skullHorror {
            0%, 100% { 
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.9)) drop-shadow(0 0 60px rgba(255, 0, 0, 0.6));
            }
            30% { 
                transform: translateY(-15px) scale(1.1);
                filter: drop-shadow(0 0 50px rgba(255, 0, 0, 1)) drop-shadow(0 0 100px rgba(255, 0, 0, 0.8));
            }
            60% { 
                transform: translateY(-5px) scale(0.95);
                filter: drop-shadow(0 0 20px rgba(255, 0, 0, 0.7)) drop-shadow(0 0 40px rgba(255, 0, 0, 0.4));
            }
        }

        .warning-badge {
            display: inline-block;
            padding: 12px 30px;
            border: 2px solid #ff0000;
            color: #ff0000;
            font-size: 16px;
            letter-spacing: 12px;
            font-family: 'Courier New', monospace;
            background: rgba(255, 0, 0, 0.05);
            animation: badgeFlash 0.8s ease-in-out infinite;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        @keyframes badgeFlash {
            0%, 100% { 
                background: rgba(255, 0, 0, 0.05);
                box-shadow: 0 0 15px rgba(255, 0, 0, 0.3), inset 0 0 15px rgba(255, 0, 0, 0.1);
            }
            50% { 
                background: rgba(255, 0, 0, 0.15);
                box-shadow: 0 0 35px rgba(255, 0, 0, 0.6), inset 0 0 25px rgba(255, 0, 0, 0.2);
            }
        }

        .main-title {
            font-size: 58px;
            color: #cc0000;
            margin: 15px 0;
            letter-spacing: 8px;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 
                0 0 20px rgba(255, 0, 0, 0.8),
                0 0 40px rgba(255, 0, 0, 0.5),
                0 0 80px rgba(255, 0, 0, 0.3);
            animation: titleNightmare 4s infinite;
            line-height: 1.3;
        }

        @keyframes titleNightmare {
            0%, 85%, 100% { opacity: 1; transform: scale(1); }
            86% { opacity: 0.3; transform: scale(1.05); }
            87% { opacity: 1; transform: scale(0.95); }
            88% { opacity: 0.6; transform: scale(1.02); }
            89% { opacity: 1; transform: scale(1); }
        }

        .tracking-info {
            font-size: 20px;
            color: #888;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            letter-spacing: 3px;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border: 1px solid #330000;
            display: inline-block;
            animation: trackingFade 3s infinite;
        }

        @keyframes trackingFade {
            0%, 100% { opacity: 0.4; border-color: #330000; }
            50% { opacity: 1; border-color: #660000; }
        }

        .tracking-info .blink-green {
            color: #00ff00;
            animation: greenBlink 0.5s step-end infinite;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.8);
        }

        @keyframes greenBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .access-denied {
            font-size: 46px;
            color: #ff0000;
            margin: 20px 0;
            font-family: 'Arial Black', sans-serif;
            animation: deniedShake 0.2s ease-in-out infinite;
            text-shadow: 
                0 0 30px rgba(255, 0, 0, 0.9),
                0 0 60px rgba(255, 0, 0, 0.6),
                0 0 100px rgba(255, 0, 0, 0.4);
            letter-spacing: 5px;
            position: relative;
        }

        .access-denied::before {
            content: '✦ تم رصد دخيل ✦';
            position: absolute;
            top: 2px;
            left: 2px;
            color: rgba(0, 0, 255, 0.5);
            z-index: -1;
            animation: deniedGhost 0.3s infinite;
        }

        @keyframes deniedShake {
            0%, 100% { transform: translate(0, 0); }
            15% { transform: translate(-4px, 2px); }
            30% { transform: translate(4px, -2px); }
            45% { transform: translate(-3px, -3px); }
            60% { transform: translate(3px, 3px); }
            75% { transform: translate(-2px, -1px); }
            90% { transform: translate(2px, 1px); }
        }

        @keyframes deniedGhost {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-3px, -1px); }
            50% { transform: translate(3px, 1px); }
            75% { transform: translate(-2px, 2px); }
        }

        .threat-panel {
            margin: 25px 0;
            padding: 20px;
            border: 1px solid #440000;
            background: rgba(255, 0, 0, 0.02);
            position: relative;
            overflow: hidden;
        }

        .threat-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.05), transparent);
            animation: threatScan 2s linear infinite;
        }

        @keyframes threatScan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .threat-label {
            font-size: 20px;
            color: #ff3333;
            letter-spacing: 6px;
            font-family: 'Courier New', monospace;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.7);
            animation: labelGlow 0.8s ease-in-out infinite alternate;
        }

        @keyframes labelGlow {
            0% { text-shadow: 0 0 20px rgba(255, 0, 0, 0.7); color: #ff3333; }
            100% { text-shadow: 0 0 40px rgba(255, 0, 0, 1), 0 0 80px rgba(255, 0, 0, 0.6); color: #ff0000; }
        }

        .threat-meter {
            width: 100%;
            height: 10px;
            background: #0a0000;
            margin-top: 15px;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
            z-index: 1;
            border: 1px solid #440000;
        }

        .threat-fill {
            height: 100%;
            background: linear-gradient(90deg, #660000, #cc0000, #ff0000, #cc0000, #660000);
            background-size: 300% 100%;
            animation: fillDanger 1s ease-in-out infinite, fillMove 3s linear infinite;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        @keyframes fillDanger {
            0%, 100% { width: 89%; }
            30% { width: 94%; }
            60% { width: 88%; }
            85% { width: 96%; }
        }

        @keyframes fillMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        .alert-message {
            margin: 15px 0;
            padding: 15px;
            border: 1px dashed #660000;
            font-family: 'Courier New', monospace;
            color: #ff4444;
            font-size: 15px;
            letter-spacing: 3px;
            animation: alertPulse 2s infinite;
            background: rgba(255, 0, 0, 0.03);
        }

        @keyframes alertPulse {
            0%, 100% { 
                opacity: 0.6; 
                border-color: #440000;
                box-shadow: none;
            }
            50% { 
                opacity: 1; 
                border-color: #990000;
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
            }
        }

        .footer-seal {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 2px solid #220000;
            font-size: 17px;
            color: #550000;
            letter-spacing: 6px;
            font-family: 'Courier New', monospace;
        }

        .footer-seal .blink-severe {
            color: #ff0000;
            animation: severeBlink 0.2s step-end infinite;
            text-shadow: 0 0 25px rgba(255, 0, 0, 1), 0 0 50px rgba(255, 0, 0, 0.6);
        }

        @keyframes severeBlink {
            0%, 100% { opacity: 1; }
            30% { opacity: 0; }
            60% { opacity: 1; }
            80% { opacity: 0; }
        }

        .countdown {
            margin-top: 10px;
            font-size: 14px;
            color: #ff6666;
            letter-spacing: 4px;
            animation: countdownPulse 1s ease-in-out infinite;
        }

        @keyframes countdownPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* رسالة طوارئ */
        .emergency-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: emergencyFlash 15s infinite;
        }

        .emergency-text {
            font-size: 80px;
            color: #ff0000;
            font-family: 'Arial Black', sans-serif;
            text-shadow: 0 0 40px #ff0000, 0 0 80px #ff0000, 0 0 120px #ff0000;
            letter-spacing: 15px;
        }

        @keyframes emergencyFlash {
            0%, 90%, 100% { opacity: 0; }
            91% { opacity: 0.9; }
            92% { opacity: 0; }
            93% { opacity: 0.7; }
            94% { opacity: 0; }
            95% { opacity: 0.5; }
            96% { opacity: 0; }
        }

        @media (max-width: 650px) {
            .box {
                padding: 20px 12px;
            }
            .main-title {
                font-size: 22px;
                letter-spacing: 3px;
            }
            .access-denied {
                font-size: 18px;
                letter-spacing: 2px;
            }
            .skull-icon {
                font-size: 60px;
            }
            .warning-badge {
                font-size: 10px;
                letter-spacing: 6px;
                padding: 8px 18px;
            }
            .tracking-info {
                font-size: 11px;
                padding: 8px 12px;
                letter-spacing: 1px;
            }
            .threat-label {
                font-size: 14px;
                letter-spacing: 3px;
            }
            .footer-seal {
                font-size: 12px;
                letter-spacing: 3px;
            }
            .alert-message {
                font-size: 10px;
                padding: 10px;
                letter-spacing: 1px;
            }
            .custom-cursor {
                display: none;
            }
            body {
                cursor: auto;
            }
            .emergency-text {
                font-size: 30px;
                letter-spacing: 8px;
            }
        }
    </style>
</head>
<body>

    <!-- ظلام دامس -->
    <div class="darkness"></div>

    <!-- عيون في الظلام -->
    <div class="eyes-container" id="eyesContainer"></div>

    <!-- وميض الشاشة -->
    <div class="screen-flicker"></div>

    <!-- خطوط المسح -->
    <div class="scan-lines"></div>

    <!-- رسالة طوارئ -->
    <div class="emergency-overlay">
        <div class="emergency-text">⚠️ اختراق ⚠️</div>
    </div>

    <!-- Canvas للتأثيرات -->
    <canvas id="horrorCanvas"></canvas>

    <!-- مؤشر التصويب -->
    <div class="custom-cursor" id="customCursor"></div>

    <div class="container" id="mainContainer">
        <div class="box">
            <div class="restricted-stamp">🚫</div>
            
            <div class="skull-container">
                <span class="skull-icon">☠️</span>
            </div>
            
            <div class="warning-badge">
                !!! اختراق !!!
            </div>

            <h1 class="main-title">
                ARBIX SECURITY
            </h1>

            <div class="tracking-info">
                <span class="blink-green">◉</span> تتبع الموقع... 
                <span class="blink-green" id="ipDisplay">192.168.</span><span style="color:#ff0000">***</span>
            </div>

            <div class="access-denied">
                ✦ تم رصد دخيل ✦
            </div>

            <div class="threat-panel">
                <div class="threat-label">⚠ مستوى التهديد: مميت ⚠</div>
                <div class="threat-meter">
                    <div class="threat-fill"></div>
                </div>
            </div>

            <div class="alert-message">
                ⛔ محاولة اختراق مكتشفة ⛔<br>
                <span style="font-size: 13px; color: #ff6666;">جاري الردع والتدمير...</span>
            </div>

            <div class="footer-seal">
                <span class="blink-severe">⬤</span> أربكس : الصقر الإلكتروني <span class="blink-severe">⬤</span><br>
                <div class="countdown">
                    ⚡ الاقتراب = فناء محقق ⚡
                </div>
            </div>
        </div>
    </div>

    <script>
        // =============== نظام الصوت المتقدم ===============
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let horrorInterval;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                startAmbientHorror();
            }
        }

        function playSound(freq, type = 'sawtooth', duration = 0.3, vol = 0.12, rampDown = true) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const filter = audioCtx.createBiquadFilter();
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = type;
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + duration);
                
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                if (rampDown) {
                    osc.frequency.exponentialRampToValueAtTime(freq * 0.3, audioCtx.currentTime + duration);
                }
                
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playHeartbeat() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            for (let i = 0; i < 3; i++) {
                playSound(40, 'sine', 0.15, 0.25, false);
            }
        }

        function playScream() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    playSound(200 + Math.random() * 300, 'sawtooth', 0.2, 0.08);
                }, i * 100);
            }
        }

        function startAmbientHorror() {
            if (horrorInterval) clearInterval(horrorInterval);
            horrorInterval = setInterval(() => {
                if (Math.random() > 0.5) {
                    playSound(30 + Math.random() * 50, 'sine', 0.5, 0.04);
                }
            }, 3000);
        }

        // =============== إنشاء العيون ===============
        function createEyes() {
            const container = document.getElementById('eyesContainer');
            const positions = [
                { top: '15%', left: '10%', delay: '0s' },
                { top: '20%', left: '80%', delay: '1s' },
                { top: '60%', left: '5%', delay: '2s' },
                { top: '70%', left: '85%', delay: '3s' },
                { top: '40%', left: '90%', delay: '1.5s' },
                { top: '80%', left: '15%', delay: '2.5s' },
                { top: '10%', left: '50%', delay: '0.5s' },
                { top: '50%', left: '2%', delay: '3.5s' },
            ];

            positions.forEach(pos => {
                const pair = document.createElement('div');
                pair.className = 'eye-pair';
                pair.style.top = pos.top;
                pair.style.left = pos.left;
                pair.style.animationDelay = pos.delay;
                pair.innerHTML = '<span class="eye"></span><span class="eye"></span>';
                container.appendChild(pair);
            });
        }

        createEyes();

        // =============== Canvas للدم والجزيئات ===============
        const canvas = document.getElementById('horrorCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const maxParticles = 150;

        function createParticle(x, y) {
            return {
                x: x || Math.random() * canvas.width,
                y: y || Math.random() * canvas.height,
                size: Math.random() * 5 + 1,
                speedX: (Math.random() - 0.5) * 1.2,
                speedY: (Math.random() - 0.5) * 1.2,
                life: 1,
                decay: Math.random() * 0.004 + 0.001,
                color: Math.random() > 0.5 ? '#ff0000' : '#8b0000'
            };
        }

        for (let i = 0; i < maxParticles; i++) {
            particles.push(createParticle());
        }

        // نص مخفي يظهر في الخلفية
        const hiddenTexts = [
            'أنت مراقب', 'لا تهرب', 'لن تنجو', 'استسلم', 'النهاية قريبة',
            'تم اختراقك', 'عد للخلف', 'ممنوع الدخول', 'خطر', 'فخ'
        ];
        
        function drawCanvas() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم الجزيئات
            particles.forEach((p, i) => {
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
                gradient.addColorStop(0, `rgba(255, 0, 0, ${p.life * 0.5})`);
                gradient.addColorStop(1, 'rgba(255, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${p.color === '#ff0000' ? '255,0,0' : '139,0,0'}, ${p.life * 0.9})`;
                ctx.fill();

                p.x += p.speedX + Math.sin(Date.now() * 0.002 + i) * 0.4;
                p.y += p.speedY + Math.cos(Date.now() * 0.002 + i) * 0.4;
                p.life -= p.decay;

                if (p.life <= 0) {
                    particles[i] = createParticle();
                    particles[i].life = 1;
                }

                if (p.x < -50) p.x = canvas.width + 50;
                if (p.x > canvas.width + 50) p.x = -50;
                if (p.y < -50) p.y = canvas.height + 50;
                if (p.y > canvas.height + 50) p.y = -50;
            });

            // نصوص مخفية تظهر
            if (Math.random() > 0.97) {
                const text = hiddenTexts[Math.floor(Math.random() * hiddenTexts.length)];
                ctx.font = `${Math.random() * 40 + 20}px 'Arial Black'`;
                ctx.fillStyle = `rgba(255, 0, 0, ${Math.random() * 0.08 + 0.02})`;
                ctx.fillText(text, Math.random() * canvas.width, Math.random() * canvas.height);
            }

            requestAnimationFrame(drawCanvas);
        }

        drawCanvas();

        // =============== مؤشر مخصص ===============
        const cursor = document.getElementById('customCursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            
            // العيون تتبع الماوس
            document.querySelectorAll('.eye').forEach(eye => {
                const rect = eye.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
                const pupil = eye.querySelector('::after');
            });
        });

        // =============== تأثير النقر المتطور ===============
        document.addEventListener('click', function(e) {
            initAudio();
            playSound(80, 'sawtooth', 0.25, 0.15);
            setTimeout(() => playSound(60, 'square', 0.3, 0.1), 200);
            setTimeout(() => playScream(), 400);

            // اهتزاز عنيف
            const container = document.getElementById('mainContainer');
            container.style.animation = 'none';
            container.offsetHeight;
            container.style.animation = 'containerGlitch 1s infinite';

            // وميض
            const flash = document.createElement('div');
            flash.style.cssText = `
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(255, 0, 0, 0.2); pointer-events: none; z-index: 9999;
                animation: megaFlash 0.4s ease-out forwards;
            `;
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 400);

            // حلقة صدمة
            const ring = document.createElement('div');
            ring.style.cssText = `
                position: fixed; top: ${e.clientY - 60}px; left: ${e.clientX - 60}px;
                width: 120px; height: 120px; border-radius: 50%;
                border: 3px solid rgba(255, 0, 0, 0.9); pointer-events: none; z-index: 9999;
                animation: shockRing 0.7s ease-out forwards;
                box-shadow: 0 0 30px rgba(255, 0, 0, 0.6), inset 0 0 30px rgba(255, 0, 0, 0.3);
            `;
            document.body.appendChild(ring);
            setTimeout(() => ring.remove(), 700);

            // جزيئات دموية كثيفة
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                const angle = (Math.PI * 2 * i) / 20;
                const distance = Math.random() * 100 + 50;
                
                particle.style.cssText = `
                    position: fixed; top: ${e.clientY}px; left: ${e.clientX}px;
                    width: ${Math.random() * 6 + 2}px; height: ${Math.random() * 6 + 2}px;
                    background: #ff0000; border-radius: 50%; pointer-events: none; z-index: 9999;
                    box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
                    animation: bloodExplode 0.9s ease-out forwards;
                    --tx: ${Math.cos(angle) * distance}px;
                    --ty: ${Math.sin(angle) * distance}px;
                `;
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 900);
            }

            // إضافة جزيئات للـCanvas
            for (let i = 0; i < 15; i++) {
                particles.push(createParticle(e.clientX, e.clientY));
            }
            if (particles.length > maxParticles + 60) {
                particles.splice(maxParticles, particles.length - maxParticles);
            }
        });

        // =============== إضافة الأنيميشنات ديناميكياً ===============
        const styleEl = document.createElement('style');
        styleEl.textContent = `
            @keyframes megaFlash {
                0% { opacity: 1; }
                100% { opacity: 0; }
            }
            @keyframes shockRing {
                0% { transform: scale(0); opacity: 1; }
                100% { transform: scale(4); opacity: 0; }
            }
            @keyframes bloodExplode {
                0% { opacity: 1; transform: translate(0, 0) scale(1); }
                100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
            }
        `;
        document.head.appendChild(styleEl);

        // =============== تحديث IP وهمي ===============
        function generateFakeIP() {
            return `${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`;
        }

        function updateIP() {
            const display = document.getElementById('ipDisplay');
            if (display) {
                const ip = generateFakeIP();
                display.innerHTML = `◉ IP: ${ip.substring(0, ip.lastIndexOf('.'))}.<span style="color:#ff0000">***</span>`;
            }
        }

        setInterval(updateIP, 4000);
        updateIP();

        // =============== منع أدوات المطور ===============
        document.addEventListener('keydown', function(e) {
            initAudio();
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U') || (e.ctrlKey && e.key === 'S')) {
                e.preventDefault();
                playSound(250, 'square', 0.5, 0.2);
                playScream();
                
                const flash = document.createElement('div');
                flash.style.cssText = `
                    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                    background: rgba(255, 0, 0, 0.35); pointer-events: none; z-index: 99999;
                    animation: megaFlash 0.5s ease-out forwards;
                `;
                document.body.appendChild(flash);
                setTimeout(() => flash.remove(), 500);
                
                alert('⚠️⚠️⚠️ تحذير أمني شديد ⚠️⚠️⚠️\n\nتم رصد محاولة فتح أدوات المطور!\n\nسيتم اتخاذ إجراءات صارمة ضدك.');
                return false;
            }
        });

        // =============== منع الزر الأيمن ===============
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            initAudio();
            playSound(180, 'square', 0.35, 0.18);
            playHeartbeat();
        });

        // =============== تأثير التمرير ===============
        document.addEventListener('wheel', function() {
            initAudio();
            if (Math.random() > 0.6) playSound(40 + Math.random() * 60, 'sawtooth', 0.2, 0.06);
        });

        // =============== نبضات قلب ===============
        setInterval(() => {
            if (Math.random() > 0.4) {
                initAudio();
                playHeartbeat();
            }
        }, 7000);

        // =============== كشف المتصفح ===============
        function getInfo() {
            const ua = navigator.userAgent;
            let browser = 'مجهول', os = 'مجهول';
            if (ua.includes('Chrome')) browser = 'Google Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            else if (ua.includes('Edge')) browser = 'Edge';
            
            if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'macOS';
            else if (ua.includes('Linux')) os = 'Linux';
            else if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iPhone')) os = 'iOS';
            
            return { browser, os };
        }

        // =============== رسائل الكونسول ===============
        const info = getInfo();
        console.log('%c💀💀💀 ARBIX SECURITY SYSTEM 💀💀💀', 'color: #ff0000; font-size: 50px; font-weight: bold;');
        console.log('%c⚠️ أنت في منطقة محظورة ⚠️', 'color: #ff0000; font-size: 22px;');
        console.log(`%c🖥️ ${info.browser} | 💻 ${info.os}`, 'color: #ff6600; font-size: 15px;');
        console.log(`%c🌐 IP: ${generateFakeIP()}`, 'color: #00ff00; font-size: 14px;');
        console.log('%c👁️ أنت تحت المراقبة الكاملة 👁️', 'color: #ff0000; font-size: 18px;');
        console.log('%c⛔ الاختراق = تدمير فوري ⛔', 'color: #ff0000; font-size: 28px; font-weight: bold;');
        console.log('%c🦅 أربكس: الصقر الإلكتروني 🦅', 'color: #cc0000; font-size: 17px;');
        console.log('%cلا تحاول الهروب...', 'color: #660000; font-size: 13px;');

        // =============== تحميل ===============
        window.addEventListener('load', () => {
            initAudio();
            setTimeout(() => playSound(50, 'sawtooth', 0.6, 0.1), 300);
            setTimeout(() => playHeartbeat(), 1000);
            console.log('%cتم التحميل... جاري المسح...', 'color: #00ff00;');
            console.log('%cتم رصد تهديد!', 'color: #ff0000; font-size: 16px;');
        });

        // =============== تحذير مغادرة ===============
        window.addEventListener('beforeunload', () => {
            initAudio();
            playSound(120, 'square', 0.4, 0.15);
            playScream();
        });

        // =============== تغيير حجم ===============
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
